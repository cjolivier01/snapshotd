# snapshotd daemon configuration
#
# Socket activation stays in systemd. This file only controls daemon-managed
# runtime settings.

state_dir=/var/lib/snapshotd
criu_bin=/usr/local/sbin/criu
criu_ns_bin=/usr/local/sbin/criu-ns
worker_timeout_seconds=600
max_checkpoint_age_seconds=2592000
min_keep_checkpoints_per_job=1
max_keep_checkpoints_per_job=5
max_bytes_per_user=0
max_bytes_total=0
